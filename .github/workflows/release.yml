name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_LOCKED: "true"
  PYTHON_VERSION: "3.13"

jobs:
  build-distributions:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.18"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify lockfile
        run: uv lock --check

      - name: Install development environment
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src tests examples scripts

      - name: Check formatting
        run: uv run ruff format --check src tests examples scripts

      - name: Check docs
        run: make docs-check

      - name: Run tests with coverage
        run: uv run --extra harness pytest --cov=src/worldforge --cov-report=term-missing --cov-fail-under=90

      - name: Audit dependencies
        run: |
          uv export --frozen --all-groups --no-emit-project --no-hashes -o requirements-ci.txt
          uvx --from pip-audit pip-audit -r requirements-ci.txt

      - name: Validate package contract
        run: bash scripts/test_package.sh

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build --out-dir dist --no-build-logs

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*

  github-release:
    name: GitHub release
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.18"

      - name: Publish distributions
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*
