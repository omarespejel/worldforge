name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: "true"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.18"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify lockfile
        run: uv lock --check

      - name: Install development environment
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src tests examples

      - name: Check formatting
        run: uv run ruff format --check src tests examples

      - name: Run tests
        run: uv run pytest

  test-matrix:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        exclude:
          - os: ubuntu-latest
            python-version: "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.18"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install development environment
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  package:
    name: Package contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.18"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Validate built package
        run: bash scripts/test_package.sh
