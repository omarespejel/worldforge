name: Bug report
description: Report a reproducible WorldForge bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, inputs, and relevant files.
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Error output or traceback.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WorldForge version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, uv version, optional runtime versions if relevant.
    validations:
      required: true
