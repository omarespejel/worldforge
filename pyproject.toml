[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "worldforge"
version = "0.1.0"
description = "Python bindings for WorldForge via PyO3"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "WorldForge contributors" }]
keywords = ["world-models", "simulation", "robotics", "ai"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://worldforge.ai"
Repository = "https://github.com/AbdelStark/worldforge"

[tool.maturin]
manifest-path = "crates/worldforge-python/Cargo.toml"
python-source = "python"
features = ["extension-module"]
bindings = "pyo3"
module-name = "worldforge"
