[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "worldforge"
version = "0.2.0"
description = "Python-first orchestration for world model prediction, planning, evaluation, and verification workflows."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "WorldForge contributors" }]
keywords = [
    "world-models",
    "simulation",
    "robotics",
    "ai",
    "foundation-models",
    "planning",
    "evaluation",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://worldforge.ai"
Repository = "https://github.com/AbdelStark/worldforge"
Documentation = "https://docs.worldforge.ai"
Issues = "https://github.com/AbdelStark/worldforge/issues"

[project.scripts]
worldforge = "worldforge.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "python"

[tool.setuptools.packages.find]
where = ["python"]

[tool.setuptools.package-data]
worldforge = ["py.typed", "_types.pyi"]
